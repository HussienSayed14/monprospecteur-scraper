services:

  # ── Scraper ────────────────────────────────────────────────────────────────
  # Does the actual work. Normally triggered by the scheduler.
  # Can also be triggered manually at any time (see README).
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monprospecteur_scraper
    user: "1001:1001"
    env_file: .env
    environment:
      HTTP_PROXY:           "http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}"
      HTTPS_PROXY:          "http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}"
      ALL_PROXY:            "http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}"
      SESSION_FILE:         "/app/session/session.json"
      PLAYWRIGHT_HEADLESS:  "true"
      TZ:                   "America/Toronto"
    volumes:
      - ./session:/app/session       # session.json persists across runs
      - ./output:/app/output         # all PDFs, JSONs, logs land here on host
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
    shm_size: '2gb'
    cap_add:
      - SYS_ADMIN
    # No restart policy — scraper runs once and exits
    # restart: no  (default — runs once and exits cleanly)

  # ── Scheduler ──────────────────────────────────────────────────────────────
  # Lightweight container that wakes up every 30s, checks the time,
  # and triggers the scraper at 05:00 Toronto time daily.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: monprospecteur_scheduler
    # scheduler runs as root inside container so it can access docker socket
    # it only writes to output/logs/scheduler.log which is fine
    environment:
      TZ:              "America/Toronto"
      SCHEDULE_HOUR:   "5"
      SCHEDULE_MINUTE: "0"
      PROJECT_DIR:     "${PWD}"   # pass host project path so docker compose works
    volumes:
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock
      - "${PWD}:${PWD}"           # mount project dir so docker compose can find it
    working_dir: "${PWD}"
    restart: unless-stopped